<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Roboto', sans-serif; background: #f5f5f5; }
    .auth-box { text-align: center; color: #333; }
    .auth-box p { margin-top: 1rem; color: #666; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #5514b4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-error { color: #c62828; display: none; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing you in via BT SSO…</p>
    <p class="auth-error" id="error"></p>
  </div>

  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="js/auth/auth-config.js"></script>
  <script src="js/auth/auth.js"></script>
  <script>
    (async () => {
      try {
        const authenticated = await initAuth();
        if (authenticated) {
          window.location.replace("index.html");
        }
      } catch (err) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").style.display = "none";
        const errorEl = document.getElementById("error");
        errorEl.style.display = "block";
        errorEl.textContent = "Authentication failed: " + err.message;
      }
    })();
  </script>
</body>
</html>
