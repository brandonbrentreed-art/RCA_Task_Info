server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Landing page is the auth guard
    location = / {
        try_files /auth-guard.html =404;
    }

    # All other pages served normally (post-auth redirect lands on index.html etc)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
