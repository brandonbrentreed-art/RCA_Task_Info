<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Diagnostics Hub</title>
  <link rel="icon" href="assets/favicon-light.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light')</script>
  <link rel="stylesheet" href="shared-ui/theme.css?v=7">
  <link rel="stylesheet" href="shared-ui/typography.css?v=6">
  <link rel="stylesheet" href="shared-ui/components.css?v=6">
  <link rel="stylesheet" href="shared-ui/layout.css?v=6">
  <link rel="stylesheet" href="shared-ui/responsive.css?v=1">
  <link rel="stylesheet" href="shared-components/nav.css?v=6">
  <link rel="stylesheet" href="shared-components/tooltip.css?v=6">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    /* iframe container — fills full viewport behind the nav chrome */
    .page-frame {
      position: fixed;
      inset: 0;
      border: none;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .page-frame.is-active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <!-- Hamburger trigger -->
  <button class="nav-trigger" aria-label="Open menu" data-tooltip="Open menu">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>

  <!-- Overlay -->
  <div class="nav-overlay"></div>

  <!-- Sidebar -->
  <nav class="nav-sidebar">
    <div class="nav-brand">
      <button class="nav-close" aria-label="Close menu" data-tooltip="Close menu">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <svg class="nav-brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 420" role="img" aria-label="openreach wordmark"><text x="40" y="295" fill="currentColor" font-family="Arial, Helvetica, sans-serif" font-size="285" font-weight="400" letter-spacing="0" text-rendering="geometricPrecision">openreach</text></svg>
    </div>
    <ul class="nav-items">
      <li class="nav-item"><a data-page="home" class="active"><span class="nav-icon nav-icon--home"></span>Home</a></li>
      <li class="nav-item"><a data-page="timeline"><span class="nav-icon nav-icon--timeline"></span>Timeline</a></li>
      <li class="nav-item"><a data-page="ndp"><span class="nav-icon nav-icon--ndp"></span>Next Day Plan</a></li>
      <li class="nav-item"><a data-page="ndc"><span class="nav-icon nav-icon--ndc"></span>NDC Allocation</a></li>
    </ul>
    <div class="nav-build">Task Diagnostics Hub &middot; V6</div>
  </nav>

  <!-- Theme toggle -->
  <button id="themeToggle" class="theme-toggle tooltip" data-tooltip="Dark mode" aria-label="Toggle theme">
    <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
    <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>

  <!-- Page iframes — each loads once and stays alive -->
  <iframe id="frame-home"     class="page-frame is-active" src="home.html"     title="Home"></iframe>
  <iframe id="frame-timeline" class="page-frame"           src="timeline.html" title="RCA Timeline"></iframe>
  <iframe id="frame-ndp"      class="page-frame"           src="ndp.html"      title="Next Day Plan"></iframe>
  <iframe id="frame-ndc"      class="page-frame"           src="ndc.html"      title="NDC Allocation"></iframe>

  <script src="js/icons.js"></script>
  <script src="shared-components/tooltip.js?v=6"></script>
  <script>
    (function () {
      "use strict";

      ["home", "timeline", "ndp", "ndc"].forEach(function (key) {
        const el = document.querySelector(".nav-icon--" + key);
        if (el) el.innerHTML = iconSvg(key, { size: "20" });
      });

      const PAGES = ["home", "timeline", "ndp", "ndc"];
      const SESSION_KEY = "active_page";

      // ---- nav open/close ----
      const trigger = document.querySelector(".nav-trigger");
      const sidebar = document.querySelector(".nav-sidebar");
      const overlay = document.querySelector(".nav-overlay");
      const closeBtn = document.querySelector(".nav-close");

      function openNav()  { sidebar.classList.add("open");    overlay.classList.add("open"); }
      function closeNav() { sidebar.classList.remove("open"); overlay.classList.remove("open"); }

      trigger.addEventListener("click", openNav);
      closeBtn.addEventListener("click", closeNav);
      overlay.addEventListener("click", closeNav);
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeNav(); });

      // ---- page switching ----
      function showPage(page) {
        if (!PAGES.includes(page)) page = "home";

        PAGES.forEach(p => {
          document.getElementById("frame-" + p).classList.toggle("is-active", p === page);
        });

        document.querySelectorAll(".nav-item a").forEach(a => {
          a.classList.toggle("active", a.dataset.page === page);
        });

        try { sessionStorage.setItem(SESSION_KEY, page); } catch (e) {}
        closeNav();
      }

      // wire nav links
      document.querySelectorAll(".nav-item a[data-page]").forEach(a => {
        a.addEventListener("click", () => showPage(a.dataset.page));
      });

      // listen for navigation messages from iframes (e.g. home page cards)
      window.addEventListener("message", e => {
        if (e.data && e.data.type === "navigate") showPage(e.data.page);
      });

      // restore last active page
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (saved) showPage(saved);

      // ---- theme toggle ----
      const themeBtn = document.getElementById("themeToggle");
      function updateThemeTooltip() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        themeBtn.setAttribute("data-tooltip", isDark ? "Light mode" : "Dark mode");
      }
      updateThemeTooltip();
      themeBtn.addEventListener("click", () => {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateThemeTooltip();
        // Sync theme into each loaded iframe
        PAGES.forEach(p => {
          const frame = document.getElementById("frame-" + p);
          try { frame.contentDocument.documentElement.setAttribute("data-theme", next); } catch (e) {}
        });
      });

    })();
  </script>
</body>
</html>
