<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCA Task Info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="shared-components/nav.css">
  <link rel="stylesheet" href="shared-components/table.css">
  <link rel="stylesheet" href="shared-components/timeline.css">
  <link rel="stylesheet" href="shared-components/tooltip.css">
  <link rel="stylesheet" href="shared-components/loader.css">
</head>
<body>

  <!-- Hamburger trigger -->
  <button class="nav-trigger" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>

  <!-- Overlay -->
  <div class="nav-overlay"></div>

  <!-- Sidebar -->
  <nav class="nav-sidebar">
    <div class="nav-brand">
      <button class="nav-close" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <img class="nav-brand-logo" src="assets/Brand_Logo.png" alt="Brand Logo">
    </div>
    <div class="nav-header">
      <span class="nav-brand-label">RCA Task Info</span>
    </div>
    <ul class="nav-items">
      <li class="nav-item"><a href="#" class="active"><span class="nav-icon">▣</span>Timeline</a></li>
      <li class="nav-item"><a href="#"><span class="nav-icon">◎</span>Reports</a></li>
      <li class="nav-item"><a href="#"><span class="nav-icon">⚙</span>Settings</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div id="app">

      <!-- Top bar: title + controls -->
      <header class="flex justify-between items-center">
        <div>
          <h2>RCA Timeline</h2>
          <p class="text-body2 mt-1" style="color:var(--color-grey-light)">Load snapshots, search by JIN ID — trace task changes across 15-min intervals.</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="search-expand">
            <button class="icon-btn search-toggle tooltip" data-tooltip="Search tasks">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input class="search-input" type="text" id="searchFilter" placeholder="Filter tasks...">
          </div>
          <button id="exportBtn" class="icon-btn tooltip" data-tooltip="Export Report">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <label class="icon-btn tooltip" data-tooltip="Load Data">
            <input type="file" id="fileInput" accept=".csv" multiple hidden>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
          </label>
          <button id="clearBtn" class="icon-btn tooltip" data-tooltip="Clear all">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </header>

      <!-- Query bar -->
      <div class="query-bar">
        <div class="flex gap-3 items-center">
          <div class="flex-1">
            <input id="jinInput" class="input" type="text" placeholder="Load data first..." disabled>
          </div>
        </div>
        <div id="chipContainer" class="chip-container"></div>
      </div>

      <!-- Results — fills remaining viewport -->
      <div id="results" class="results-area"></div>

    </div>
  </div>

  <script src="shared-components/tooltip.js"></script>
  <script src="js/dataLoader.js"></script>
  <script src="js/timelineEngine.js"></script>
  <script src="js/timelineRenderer.js"></script>
  <script src="shared-components/nav.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
