<!DOCTYPE html>
<html lang="en">
<head>
  <title>Task Diagnostics Hub — Timeline</title>
  <!-- include: partials/head.html -->
  <link rel="stylesheet" href="shared-components/table.css">
  <link rel="stylesheet" href="shared-components/timeline.css">
  <link rel="stylesheet" href="shared-components/tooltip.css">
  <link rel="stylesheet" href="shared-components/loader.css">
  <link rel="stylesheet" href="shared-components/modal.css">
  <link rel="stylesheet" href="shared-components/notify.css">
</head>
<body>

  <!-- include: partials/nav.html -->

  <!-- Main Content -->
  <div class="main-content">
    <div id="app">

      <!-- Top bar: title + controls -->
      <header class="flex justify-between items-center">
        <div style="cursor:default">
          <h2>RCA Timeline</h2>
          <p class="text-body2 mt-1" style="color:var(--color-grey-light)">Load snapshots, search by JIN ID — trace task changes across 15-min intervals.</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="search-expand">
            <button class="icon-btn search-toggle tooltip" data-tooltip="Search tasks">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input class="search-input" type="text" id="searchFilter" placeholder="Filter tasks...">
            <button class="search-clear" id="searchClear" aria-label="Clear search">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <button id="exportBtn" class="icon-btn tooltip" data-tooltip="Export Report">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <button id="fetchBtn" class="icon-btn tooltip" data-tooltip="Fetch Live Data">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
          </button>
          <button id="clearBtn" class="icon-btn tooltip" data-tooltip="Clear all">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </header>

      <!-- Query bar -->
      <div class="query-bar">
        <div class="flex gap-3 items-center">
          <div class="flex-1">
            <input id="jinInput" class="input" type="text" placeholder="Load data first..." disabled>
          </div>
        </div>
        <div id="chipContainer" class="chip-container"></div>
      </div>

      <!-- Results — fills remaining viewport -->
      <div id="results" class="results-area"></div>

    </div>
  </div>

  <!-- Fetch Live Data Modal -->
  <div class="modal-backdrop" id="powFetchModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Fetch Live Data</h3>
        <button class="modal-close" aria-label="Close" data-tooltip="Close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p style="font-size:var(--text-body2);color:var(--color-grey);margin-bottom:var(--spacing-4)">Pull live pool of work from BigQuery. Data loads directly into the timeline.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-4)">
          <div>
            <label style="display:block;font-size:var(--text-caption);color:var(--color-grey);margin-bottom:var(--spacing-1)" data-tooltip="Enter the zone code to query, e.g. EAABDN">Zone Code <span style="color:var(--color-error)">*</span></label>
            <input id="powZoneInput" class="input" type="text" placeholder="e.g. EAABDN" autocomplete="off" style="width:100%;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:var(--text-caption);color:var(--color-grey);margin-bottom:var(--spacing-1)" data-tooltip="Defaults to today if left blank">Target Date <span style="font-size:var(--text-caption);color:var(--color-grey-light)">(optional — defaults to today)</span></label>
            <div style="display:flex;align-items:center;gap:var(--spacing-2)">
              <input id="powDateInput" class="input" type="text" placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}" maxlength="10" autocomplete="off" style="flex:1;box-sizing:border-box">
              <input id="powDatePicker" type="date" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" tabindex="-1">
              <button type="button" class="icon-btn" data-tooltip="Pick a date" onclick="document.getElementById('powDatePicker').showPicker()" style="flex-shrink:0">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zM7 12h5v5H7z"/></svg>
              </button>
            </div>
          </div>
          <p id="powFetchError" style="display:none;font-size:var(--text-caption);color:var(--color-error);margin:0"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-text" id="demoBtn" style="margin-right:auto">Load Demo</button>
        <button class="btn btn-text" id="powFetchCancel">Cancel</button>
        <button class="btn btn-primary" id="powFetchGo">Fetch</button>
      </div>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-backdrop" id="taskDetailModal">
    <div class="modal modal-full">
      <div class="modal-header">
        <div class="modal-header-actions">
          <h3 id="taskDetailTitle">Task Detail</h3>
          <button id="taskDetailCopy" class="icon-btn tooltip" data-tooltip="Copy Summary" aria-label="Copy summary">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
        <button class="modal-close" aria-label="Close" data-tooltip="Close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body" id="taskDetailBody"></div>
    </div>
  </div>

  <script src="js/auth/auth-config.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/powData.js"></script>
  <script src="shared-components/tooltip.js?v=5"></script>
  <script src="shared-components/modal.js?v=5"></script>
  <script src="shared-components/notify.js"></script>
  <script src="shared-components/search.js?v=6"></script>
  <script src="shared-components/pagination.js?v=5"></script>
  <script src="js/dataLoader.js?v=5"></script>
  <script src="js/timelineEngine.js?v=5"></script>
  <script src="js/timelineRenderer.js?v=5"></script>
  <script src="shared-components/nav.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
