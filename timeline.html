<!DOCTYPE html>

  <meta charset="UTF-8">

      <li class="nav-item"><a href="ndc.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></span>NDC Allocation</a></li>

  <!-- Main Content -->
  <div class="main-content">
    <div id="app">

      <!-- Top bar: title + controls -->
      <header class="flex justify-between items-center">
        <div>
          <h2>RCA Timeline</h2>
          <p class="text-body2 mt-1" style="color:var(--color-grey-light)">Load snapshots, search by JIN ID — trace task changes across 15-min intervals.</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="search-expand">
            <button class="icon-btn search-toggle tooltip" data-tooltip="Search tasks">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input class="search-input" type="text" id="searchFilter" placeholder="Filter tasks...">
            <button class="search-clear" id="searchClear" aria-label="Clear search">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <button id="exportBtn" class="icon-btn tooltip" data-tooltip="Export Report">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <label class="icon-btn tooltip" data-tooltip="Load Data">
            <input type="file" id="fileInput" accept=".csv" multiple hidden>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
          </label>
          <button id="clearBtn" class="icon-btn tooltip" data-tooltip="Clear all">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </header>

      <!-- Query bar -->
      <div class="query-bar">
        <div class="flex gap-3 items-center">
          <div class="flex-1">
            <input id="jinInput" class="input" type="text" placeholder="Load data first..." disabled>
          </div>
        </div>
        <div id="chipContainer" class="chip-container"></div>
      </div>

      <!-- Results — fills remaining viewport -->
      <div id="results" class="results-area"></div>

    </div>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-backdrop" id="taskDetailModal">
    <div class="modal modal-full">
      <div class="modal-header">
        <div class="modal-header-actions">
          <h3 id="taskDetailTitle">Task Detail</h3>
          <button id="taskDetailCopy" class="icon-btn tooltip" data-tooltip="Copy Summary" aria-label="Copy summary">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
        <button class="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body" id="taskDetailBody"></div>
    </div>
  </div>

  <script src="shared-components/tooltip.js?v=5"></script>
  <script src="shared-components/modal.js?v=5"></script>
  <script src="shared-components/pagination.js?v=5"></script>

  <script src="js/timelineEngine.js?v=5"></script>
  <script src="js/timelineRenderer.js?v=5"></script>
  <script src="shared-components/nav.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
