</head>

      </button>

    <ul class="nav-items">

      <li class="nav-item"><a href="timeline.html" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm3.3 14.71L11 14.17V7h2v6.41l3.71 2.21-.42 1.09z"/></svg></span>Timeline</a></li>
      <li class="nav-item"><a href="ndp.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></span>Next Day Plan</a></li>

  <!-- Theme toggle (top-right) -->
  <button id="themeToggle" class="theme-toggle tooltip" data-tooltip="Dark mode" aria-label="Toggle theme">
    <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
    <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>

  <!-- Main Content -->
  <div class="main-content">
    <div id="app">

      <!-- Top bar: title + controls -->
      <header class="flex justify-between items-center">
        <div style="cursor:default">
          <h2>RCA Timeline</h2>
          <p class="text-body2 mt-1" style="color:var(--color-grey-light)">Load snapshots, search by JIN ID — trace task changes across 15-min intervals.</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="search-expand">
            <button class="icon-btn search-toggle tooltip" data-tooltip="Search tasks">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input class="search-input" type="text" id="searchFilter" placeholder="Filter tasks...">
            <button class="search-clear" id="searchClear" aria-label="Clear search">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <button id="exportBtn" class="icon-btn tooltip" data-tooltip="Export Report">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <button id="fetchBtn" class="icon-btn tooltip" data-tooltip="Fetch Live Data">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
          </button>
          <button id="clearBtn" class="icon-btn tooltip" data-tooltip="Clear all">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </header>

      <!-- Query bar -->
      <div class="query-bar">
        <div class="flex gap-3 items-center">
          <div class="flex-1">
            <input id="jinInput" class="input" type="text" placeholder="Load data first..." disabled>
          </div>
        </div>
        <div id="chipContainer" class="chip-container"></div>
      </div>

      <!-- Results — fills remaining viewport -->
      <div id="results" class="results-area"></div>

    </div>
  </div>

  <!-- Fetch Live Data Modal -->
  <div class="modal-backdrop" id="powFetchModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Fetch Live Data</h3>
        <button class="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p style="font-size:var(--text-body2);color:var(--color-grey);margin-bottom:var(--spacing-4)">Pull live pool of work from BigQuery. Data loads directly into the timeline.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-4)">
          <div>
            <label style="display:block;font-size:var(--text-caption);color:var(--color-grey);margin-bottom:var(--spacing-1)">Zone Code <span style="color:var(--color-error)">*</span></label>
            <input id="powZoneInput" class="input" type="text" placeholder="e.g. EAABDN" autocomplete="off" style="width:100%;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:var(--text-caption);color:var(--color-grey);margin-bottom:var(--spacing-1)">Target Date <span style="font-size:var(--text-caption);color:var(--color-grey-light)">(optional — defaults to today)</span></label>
            <input id="powDateInput" class="input" type="date" style="width:100%;box-sizing:border-box">
          </div>
          <p id="powFetchError" style="display:none;font-size:var(--text-caption);color:var(--color-error);margin:0"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-text" id="powFetchCancel" style="padding:var(--spacing-2) var(--spacing-4);border:none;background:none;cursor:pointer;font-family:var(--font-family);font-size:var(--text-body2);color:var(--color-grey)">Cancel</button>
        <button class="btn-primary" id="powFetchGo" style="padding:var(--spacing-2) var(--spacing-4);border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font-family);font-size:var(--text-body2)">Fetch</button>
      </div>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-backdrop" id="taskDetailModal">
    <div class="modal modal-full">
      <div class="modal-header">
        <div class="modal-header-actions">
          <h3 id="taskDetailTitle">Task Detail</h3>
          <button id="taskDetailCopy" class="icon-btn tooltip" data-tooltip="Copy Summary" aria-label="Copy summary">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
        <button class="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body" id="taskDetailBody"></div>
    </div>
  </div>

  <script src="js/auth/auth-config.js"></script>

  <script src="shared-components/tooltip.js?v=5"></script>

  <script src="shared-components/pagination.js?v=5"></script>
  <script src="js/dataLoader.js?v=5"></script>
  <script src="js/timelineEngine.js?v=5"></script>
  <script src="js/timelineRenderer.js?v=5"></script>
  <script src="shared-components/nav.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
